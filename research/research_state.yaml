schema_version: ResearchState.v1
produced_by: repotrace-architecture-freeze
architecture_version: 0.1.0
mechanistic_bet: >-
  Separating immutable evidence from revisable retrieval/session lineage and durable
  memory reduces repeated inference and prevents interpretation drift from mutating facts.
current_invariants:
  - no high-level belief without downward evidence link
  - no frame without motif_id and incident_id
  - no retrieval attempt without verdict and discriminating check or gap description
  - no durable claim without concrete provenance
  - every new-layer artifact has schema_version and produced_by
  - incident evidence is append-only
  - investigation state is versioned separately from evidence
known_fractures:
  - legacy retrieval artifacts use multiple shapes and are missing schema_version/produced_by
  - legacy incident markdown acts as primary view in existing workflow
  - durable claims currently live in diagnostics/claims.json without concrete provenance fields
active_questions:
  - when to flip retrieval tooling default from legacy compatibility write to session-only write
  - whether to require commit_refs for every durable claim update
  - how to attach witness_ids at capture time from mobile diagnostics UI
  - how to formalize frame/procedure runtime once lineage quality is stable
deferred_features:
  - predictive routing
  - frame engine runtime
  - graph database
  - learned weighting
  - broad refactors
  - app bug solving
evaluation_fixtures:
  - fixture_id: nutriplanner-collapse-case
    path: eval/fixtures/nutriplanner-collapse-case.yaml
    purpose: validate evidence/session separation under interpretation drift
next_actions:
  - wire validator into CI as non-blocking forward-only check
  - add migration command to backfill optional v1 mirrors for legacy retrieval fixtures
  - define durable memory write path after provenance producers are available
